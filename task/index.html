<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Planner</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-bg" aria-hidden="true"></div>
    <div class="page-scrim" aria-hidden="true"></div>

    <div class="app">
      <header class="top-bar">
        <div class="top-bar__meta">
          <div class="top-bar__field top-bar__field--month">
            <label class="top-bar__label" for="monthPicker">MONTH</label>
            <input type="month" id="monthPicker" class="month-picker" name="planner-month" />
          </div>
          <span class="top-bar__label top-bar__label--week">WEEK: <span id="weekLabel">01</span></span>
        </div>
        <div class="top-bar__controls">
          <button type="button" class="btn btn--nav" id="prevWeek">Previous week</button>
          <button type="button" class="btn btn--nav" id="nextWeek">Next week</button>
          <label class="sr-only" for="weekInput">Week of month (1 to 5)</label>
          <input
            type="number"
            id="weekInput"
            class="week-input"
            placeholder="1–5"
            min="1"
            max="5"
            step="1"
            inputmode="numeric"
            autocomplete="off"
          />
          <button type="button" class="btn btn--go" id="goWeek">Go</button>
          <button type="button" class="btn btn--nav" id="openSettings" title="Settings">⋮</button>
        </div>
      </header>

      <main class="layout">
        <section class="panel panel--todos">
          <h2 class="section-title">TODO LIST</h2>
          <div class="todo-grid" id="todoGrid"></div>
        </section>

        <section class="panel panel--right">
          <div class="habit-block">
            <div class="section-head">
              <h2 class="section-title section-title--inline">HABIT TRACKER</h2>
              <span class="section-icons" aria-hidden="true" title="Planner doodles">✍️ 📔</span>
            </div>
            <div class="habit-table-wrap glass-surface">
              <table class="habit-table" id="habitTable">
                <thead>
                  <tr>
                    <th class="habit-table__habits-col" scope="col">HABITS</th>
                    <th scope="col">MON</th>
                    <th scope="col">TUE</th>
                    <th scope="col">WED</th>
                    <th scope="col">THU</th>
                    <th scope="col">FRI</th>
                    <th scope="col">SAT</th>
                    <th scope="col">SUN</th>
                  </tr>
                </thead>
                <tbody id="habitBody"></tbody>
              </table>
            </div>
          </div>

          <div class="note-block glass-surface glass-surface--note">
            <label class="note-label" for="noteArea">NOTE</label>
            <textarea id="noteArea" class="note-area" rows="8" spellcheck="true" placeholder="Jot something down…"></textarea>
          </div>
        </section>
      </main>
    </div>
    <div class="settings-modal" id="settingsModal" aria-hidden="true">
      <div class="settings-panel" role="dialog" aria-labelledby="settingsTitle">
        <header class="settings-header">
          <h2 class="settings-title" id="settingsTitle">Settings</h2>
          <button type="button" class="settings-close" id="closeSettings" aria-label="Close settings">×</button>
        </header>
        <div class="settings-body">
          <div class="settings-group">
            <label class="settings-label" for="settingCardColor">Card Background Color</label>
            <input type="color" id="settingCardColor" class="settings-input-color" value="#ffffff" />
          </div>
          <div class="settings-group">
            <label class="settings-label" for="settingFontColor">Font Color</label>
            <input type="color" id="settingFontColor" class="settings-input-color" value="#0a0a0f" />
          </div>
          <div class="settings-group">
            <label class="settings-label" for="settingBtnBg">Button Color</label>
            <input type="color" id="settingBtnBg" class="settings-input-color" value="#ffffff" />
          </div>
          <div class="settings-group">
            <label class="settings-label" for="settingBtnText">Button Font Color</label>
            <input type="color" id="settingBtnText" class="settings-input-color" value="#101620" />
          </div>
          <div class="settings-group">
            <label class="settings-label" for="settingBgDesktop">Background Image (Desktop)</label>
            <input type="file" id="settingBgDesktop" class="settings-input-file" accept="image/*" />
          </div>
          <div class="settings-group">
            <label class="settings-label" for="settingBgMobile">Background Image (Mobile)</label>
            <input type="file" id="settingBgMobile" class="settings-input-file" accept="image/*" />
          </div>
          <div class="settings-group">
            <label class="settings-label" for="settingHabitBg">Habit Tracker Background</label>
            <input type="color" id="settingHabitBg" class="settings-input-color" value="#ffffff" />
          </div>
          <div class="settings-group">
            <label class="settings-label" for="settingHabitFont">Habit Tracker Font Color</label>
            <input type="color" id="settingHabitFont" class="settings-input-color" value="#0a0a0f" />
          </div>
          <div class="settings-actions">
            <button type="button" class="btn btn--reset" id="resetSettings">Reset to Default</button>
          </div>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
